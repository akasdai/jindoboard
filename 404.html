<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Show Your Jindo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
    }
    .not-found-icon { font-size: 5rem; }
    .not-found h1 { font-size: 2rem; font-weight: 800; }
    .not-found p { color: var(--text-muted); font-size: .95rem; max-width: 360px; line-height: 1.65; }
    .not-found .btn-upload { text-decoration: none; margin-top: 8px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">
        <div class="logo-icon-box">
          <span style="font-size:1.2rem;display:flex;align-items:center;justify-content:center;color:#fff;">🐾</span>
        </div>
        <span class="logo-text">Show Your <em class="logo-k">Jindo</em></span>
      </a>
    </div>
  </header>

  <div class="not-found">
    <div class="not-found-icon">🐾</div>
    <h1>Page Not Found</h1>
    <p>Looks like this Jindo ran off! The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn-upload" href="index.html">Back to Home</a>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <a class="footer-brand" href="index.html">Show Your Jindo</a>
      <p class="footer-copy">© 2026 Show Your Jindo. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
